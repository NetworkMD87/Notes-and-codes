<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" />
    <title>Notes & Codes</title>
    <style>
      :root{--radius:4px;--gap:8px;--shadow:0 6px 24px rgba(0,0,0,.28);--motion-fast:120ms;--motion:160ms;--ease:cubic-bezier(.2,.6,.2,1)}
      html,body,#app{height:100%;margin:0;font-family:var(--ui-font,Segoe UI,system-ui,sans-serif)}
      body{background:var(--editorbg);color:var(--bartext)}
      button,select,input,textarea{font-family:inherit}
      #app{display:flex;flex-direction:row}
      #main{flex:1;min-width:0;height:100%;display:flex;flex-direction:column;position:relative}
      #header{height:34px;display:flex;align-items:center;background:var(--bar);border-bottom:1px solid var(--border)}
      #tabbar{flex:1;min-width:0;height:100%;display:flex;align-items:center;overflow-x:auto;overflow-y:hidden}
      #panes{flex:1;display:flex;min-height:0}
      .pane{flex:1;min-width:0;overflow:hidden}
      .pane.hidden{display:none}
      #statusbar{height:22px;background:var(--panel-bg);color:var(--muted);border-top:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:12px;padding:0 8px}
      .sb-state{color:var(--muted)}
      .sb-dirty{color:var(--accent)}
      .tab{box-sizing:border-box;display:flex;align-items:center;gap:6px;padding:0 10px;height:100%;color:var(--tab-inactive-text);border-right:1px solid var(--border);border-top:2px solid transparent;cursor:pointer;white-space:nowrap}
      .tab:hover{background:var(--bar-hover)}
      .tab.active{background:var(--tab-active-bg);color:var(--bartext);border-top:2px solid var(--accent)}
      .tab.dragging{opacity:.5}
      .tab.drop-before{box-shadow:inset 2px 0 0 var(--accent)}
      .tab.drop-after{box-shadow:inset -2px 0 0 var(--accent)}
      .tab-close{opacity:.6}.tab-close:hover{opacity:1}
      .tab-add{background:none;border:none;color:var(--bartext);font-size:16px;cursor:pointer;padding:0 10px}
      .gutter{background:var(--border);cursor:col-resize}
      .gutter.gutter-horizontal{width:6px}
      #theme-toggle{background:none;border:none;color:var(--bartext);cursor:pointer;font-size:14px;padding:0 10px}
      #toolbar{margin-left:auto;display:flex;align-items:center;gap:1px;padding:0 2px}
      .tb-btn{background:none;border:none;color:var(--bartext);cursor:pointer;padding:4px 6px;display:flex;align-items:center;border-radius:var(--radius);line-height:0}
      .tb-btn:hover{background:var(--bar-hover)}
      .tb-btn.tb-active{background:var(--accent);color:var(--accent-text)}
      .tb-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
      .hl-yellow{background:rgba(255,213,0,.35)}
      .hl-green{background:rgba(64,200,100,.32)}
      .hl-blue{background:rgba(70,150,255,.32)}
      .hl-pink{background:rgba(255,90,170,.32)}
      .hl-orange{background:rgba(255,140,0,.32)}
      .hl-purple{background:rgba(170,110,235,.32)}
      .hl-red{background:rgba(240,70,70,.32)}
      .hl-mode .view-lines{cursor:cell}
      .tb-hl-wrap{position:relative;display:flex;align-items:center}
      .tb-caret{padding:4px 2px;font-size:10px}
      .tb-hl-pop{position:absolute;top:100%;left:0;display:flex;flex-wrap:wrap;gap:6px;padding:6px;margin-top:4px;max-width:168px;background:var(--bar);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:100}
      .tb-hl-pop.hidden{display:none}
      .tb-swatch{width:18px;height:18px;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:0}
      .tb-hl-clear{flex-basis:100%;margin-top:2px;padding:4px 6px;background:none;border:1px solid var(--border);border-radius:var(--radius);color:var(--bartext);cursor:pointer;font-size:12px}
      .tb-hl-clear:hover{background:var(--bar-hover)}
      .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;justify-content:center;align-items:flex-start;padding-top:80px;z-index:100}
      .overlay.hidden{display:none}
      #palette{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;justify-content:center;align-items:flex-start;padding-top:80px;z-index:100}
      #palette.hidden{display:none}
      .palette-box{width:560px;background:var(--panel-bg);box-shadow:var(--shadow);border-radius:var(--radius);overflow:hidden}
      #palette input{width:100%;box-sizing:border-box;padding:10px;font-size:14px;background:var(--panel-bg);color:var(--panel-text);border:none;border-bottom:1px solid var(--border);outline:none}
      #palette input:focus{border-bottom-color:var(--accent)}
      .palette-list{width:100%;max-height:320px;overflow:auto}
      .palette-row{padding:6px 8px;color:var(--panel-text);cursor:pointer;display:flex;justify-content:space-between;gap:16px}
      .palette-hint{opacity:.55;font-size:12px}
      .palette-row.active{background:var(--accent);color:var(--accent-text)}
      #diff{position:absolute;inset:34px 0 22px 0;background:var(--editorbg);z-index:100}
      #diff.hidden{display:none}
      .diff-close{position:absolute;top:8px;right:8px;z-index:20;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;border-radius:var(--radius);background:var(--panel-bg);color:var(--panel-text);box-shadow:var(--shadow);font-size:13px;line-height:1;cursor:pointer}
      .diff-close:hover{background:var(--accent);color:var(--accent-text)}
      #ctx-menu{position:fixed;z-index:100;min-width:150px;background:var(--panel-bg);color:var(--panel-text);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:4px 0;font-size:13px}
      .ctx-item{padding:6px 14px;cursor:pointer;white-space:nowrap}
      .ctx-item:hover{background:var(--accent);color:var(--accent-text)}
      #sidebar{background:var(--bar);color:var(--bartext);border-right:1px solid var(--border);overflow:auto;min-width:0;font-size:13px;user-select:none}
      #sidebar.hidden{display:none}
      .sb-row{display:flex;align-items:center;gap:4px;height:24px;cursor:pointer;white-space:nowrap;overflow:hidden}
      .sb-row:hover{background:var(--bar-hover)}
      .sb-row.active{background:var(--accent);color:var(--accent-text)}
      .sb-twisty{width:12px;flex:none;text-align:center;opacity:.7}
      .sb-label{overflow:hidden;text-overflow:ellipsis}
      #quick-open{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;justify-content:center;align-items:flex-start;padding-top:80px;z-index:100}
      #quick-open.hidden{display:none}
      .qo-box{width:560px;background:var(--panel-bg);box-shadow:var(--shadow);border-radius:var(--radius);overflow:hidden}
      .qo-box input{width:100%;box-sizing:border-box;padding:10px;font-size:14px;background:var(--panel-bg);color:var(--panel-text);border:none;border-bottom:1px solid var(--border)}
      .qo-list{max-height:320px;overflow:auto}
      .qo-row{display:flex;align-items:baseline;gap:10px;padding:6px 10px;color:var(--panel-text);cursor:pointer}
      .qo-row.active,.qo-row:hover{background:var(--accent);color:var(--accent-text)}
      .qo-path{opacity:.55;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .diff-picker{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;justify-content:center;align-items:flex-start;padding-top:90px;z-index:100}
      .diff-picker.hidden{display:none}
      .diff-picker-box{display:grid;grid-template-columns:auto 1fr;gap:8px 10px;background:var(--panel-bg);color:var(--panel-text);padding:16px;border-radius:var(--radius);box-shadow:var(--shadow)}
      .diff-picker-box button{grid-column:1 / -1}
      #toast-host{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:6px;z-index:200}
      .toast{background:var(--panel-bg);color:var(--panel-text);border:1px solid var(--border);padding:8px 14px;border-radius:var(--radius);font-size:13px;box-shadow:var(--shadow)}
      .sb-click{cursor:pointer;color:var(--bartext);text-decoration:underline dotted;text-underline-offset:2px}
      .sb-click:hover{color:var(--accent)}
      #mdpreview{flex:1;min-width:0;overflow:auto;padding:0 16px;background:var(--editorbg);color:var(--bartext)}
      #mdpreview.hidden{display:none}
      #mdpreview pre{background:var(--bar-hover);padding:8px;border-radius:var(--radius);overflow:auto}
      #mdpreview code{font-family:'JetBrains Mono',Consolas,monospace}
      .ph-picker,.snip-picker,.input-overlay,.snip-mgr,.appearance{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;justify-content:center;align-items:flex-start;padding-top:80px;z-index:100}
      .ph-picker.hidden,.snip-picker.hidden,.input-overlay.hidden,.snip-mgr.hidden,.appearance.hidden{display:none}
      .ph-list,.snip-list{width:560px;max-height:340px;overflow:auto;background:var(--panel-bg);color:var(--panel-text);box-shadow:var(--shadow)}
      .ph-row,.snip-row{padding:6px 10px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid var(--border)}
      .ph-row:hover,.snip-row:hover{background:var(--accent);color:var(--accent-text)}
      .input-box{display:flex;flex-direction:column;gap:8px;background:var(--panel-bg);color:var(--panel-text);padding:16px;border-radius:var(--radius);width:360px;box-shadow:var(--shadow)}
      .input-box input{padding:6px;background:var(--bar);color:var(--panel-text);border:1px solid var(--border)}
      .snip-mgr{padding-top:60px}
      .snip-mgr-box{width:620px;max-height:80vh;display:flex;flex-direction:column;background:var(--panel-bg);color:var(--panel-text);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
      .snip-mgr-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border)}
      .snip-mgr-head span{flex:1;font-weight:600}
      .snip-mgr-list{overflow:auto;padding:8px 12px}
      .snip-mgr-row{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:start;padding:8px 0;border-bottom:1px solid var(--border)}
      .snip-mgr-name{grid-column:1;padding:4px}
      .snip-mgr-body{grid-column:1;min-height:54px;font-family:'JetBrains Mono',Consolas,monospace;padding:4px}
      .snip-mgr-row button{grid-column:2;grid-row:1 / span 2}
      .snip-mgr-empty{padding:16px;opacity:.7}
      #change-bar{position:absolute;left:0;right:0;top:34px;background:var(--accent);color:var(--accent-text);font-size:13px;display:flex;align-items:center;gap:12px;padding:6px 12px;z-index:90}
      #change-bar.hidden{display:none}
      #change-bar button{background:rgba(255,255,255,.18);border:none;color:var(--accent-text);padding:3px 10px;border-radius:3px;cursor:pointer}
      .appearance-box{width:720px;max-width:92vw;max-height:80vh;overflow:auto;background:var(--panel-bg);color:var(--panel-text);border:1px solid var(--accent);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:flex;flex-wrap:wrap;gap:20px}
      .appearance-col-left{flex:1 1 240px;min-width:220px;display:flex;flex-direction:column;gap:14px}
      .appearance-col-right{flex:1 1 320px;min-width:260px;display:flex;flex-direction:column;gap:14px}
      .appearance h3{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--accent)}
      .appearance-themes{display:grid;grid-template-columns:1fr 1fr;gap:6px}
      .appearance-theme{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer}
      .appearance-theme.active{border-color:var(--accent);outline:1px solid var(--accent)}
      .appearance-sw{display:flex;gap:8px;flex-wrap:wrap}
      .swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent}
      .swatch.active{border-color:var(--bartext)}
      .appearance-row{display:flex;align-items:center;gap:8px}
      .appearance-row + .appearance-row{margin-top:8px}
      .appearance-row label{flex:1}
      .appearance select,.appearance input[type=number],.appearance input[type=text]{background:var(--bar);color:var(--panel-text);border:1px solid var(--border);padding:4px}
      .appearance select{min-width:150px}
      .file-history{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;justify-content:center;align-items:flex-start;padding-top:80px;z-index:100}
      .file-history.hidden{display:none}
      .fh-box{width:460px;max-height:80vh;overflow:auto;background:var(--panel-bg);color:var(--panel-text);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
      .fh-box h3{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;opacity:.7}
      .fh-empty{opacity:.7;padding:8px 0}
      .fh-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
      .fh-when{flex:1}
      .fh-row button{background:var(--bar);color:var(--panel-text);border:1px solid var(--border);border-radius:var(--radius);padding:3px 10px;cursor:pointer}
      .fh-row button:hover{background:var(--bar-hover)}
      .help-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;justify-content:center;align-items:flex-start;padding-top:60px;z-index:100}
      .help-overlay.hidden{display:none}
      .help-box{position:relative;width:560px;max-height:84vh;display:flex;flex-direction:column;background:var(--panel-bg);color:var(--panel-text);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
      .help-titlebar{display:flex;align-items:center;gap:8px;padding:9px 10px 9px 14px;background:var(--bar);border-bottom:1px solid var(--border)}
      .help-title{flex:1;font-size:14px;font-weight:600;color:var(--panel-text)}
      .help-close{flex:none;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:none;border-radius:var(--radius);background:transparent;color:var(--panel-text);opacity:.7;cursor:pointer;font-size:13px;line-height:1}
      .help-close:hover{background:var(--accent);color:var(--accent-text);opacity:1}
      .help-toggle{flex:none;font-size:12px;padding:3px 10px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--panel-text);opacity:.8;cursor:pointer;line-height:1.4}
      .help-toggle:hover{opacity:1;background:var(--bar-hover)}
      .help-toggle.on{background:var(--accent);color:var(--accent-text);border-color:var(--accent);opacity:1}
      .help-search{width:100%;box-sizing:border-box;padding:9px 14px;font-size:14px;background:var(--editorbg);color:var(--panel-text);border:none;border-bottom:1px solid var(--border);outline:none}
      .help-search::placeholder{color:var(--muted)}
      .help-note{padding:7px 14px;font-size:12px;color:var(--muted);background:var(--panel-bg);border-bottom:1px solid var(--border)}
      .help-body{overflow:auto;padding:4px 8px 12px}
      .help-body::-webkit-scrollbar{width:12px}
      .help-body::-webkit-scrollbar-track{background:transparent}
      .help-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;border:3px solid var(--panel-bg)}
      .help-body::-webkit-scrollbar-thumb:hover{background:var(--muted)}
      .help-cat{margin-top:12px}
      .help-cat:first-child{margin-top:4px}
      .help-cat-title{position:sticky;top:0;background:var(--panel-bg);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--panel-text);padding:5px 6px 5px 8px;border-left:3px solid var(--accent);margin-bottom:3px}
      .help-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:5px 8px;border-radius:var(--radius)}
      .help-row:hover{background:var(--bar-hover)}
      .help-main{min-width:0;flex:1}
      .help-label{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .help-desc{display:none;font-size:12px;line-height:1.35;color:var(--muted);margin-top:2px;white-space:normal}
      .desc-on .help-desc{display:block}
      .help-kbd{flex:none;font-family:'JetBrains Mono',Consolas,monospace;font-size:12px;background:var(--bar);color:var(--panel-text);border:1px solid var(--border);border-bottom-width:2px;border-radius:var(--radius);padding:2px 7px;white-space:nowrap}
      .help-empty{padding:24px 8px;text-align:center;color:var(--muted)}
      .about-card{padding:30px 24px;display:flex;flex-direction:column;align-items:center;gap:8px}
      .about-logo{width:240px;max-width:72%;color:var(--panel-text);margin-bottom:2px}
      .about-logo svg{width:100%;height:auto;display:block}
      .about-logo .wm-brace{fill:var(--accent)}
      .about-rule{width:44px;height:3px;border-radius:2px;background:var(--accent);margin-bottom:6px}
      .about-version{color:var(--muted);font-size:13px}
      .about-tagline{opacity:.85;font-size:14px;margin-bottom:8px}
      .about-links{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
      .about-link{background:var(--bar);color:var(--panel-text);border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;cursor:pointer;font-size:13px}
      .about-link:hover{background:var(--accent);color:var(--accent-text)}
      /* --- micro-motion layer (Phase 3.5 P1) --- */
      .tab,.tb-btn,.tab-add,.tab-close,#theme-toggle,.palette-row,.qo-row,.sb-row,.ctx-item,.help-row,.about-link,.fh-row button,.help-close,.diff-close,.help-toggle,.sb-click,.swatch,.appearance-theme,.tb-swatch{transition:background-color var(--motion-fast) var(--ease),color var(--motion-fast) var(--ease),opacity var(--motion-fast) var(--ease),border-color var(--motion-fast) var(--ease)}
      @keyframes overlayIn{from{opacity:0;transform:translateY(6px) scale(.985)}to{opacity:1;transform:none}}
      .palette-box,.qo-box,.appearance-box,.help-box,.fh-box,.input-box,.snip-mgr-box,.diff-picker-box,#ctx-menu,.ph-list,.snip-list,.toast{animation:overlayIn var(--motion) var(--ease)}
      @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}}
    </style>
  </head>
  <body>
    <div id="app">
      <div id="sidebar" class="hidden"></div>
      <div id="main">
        <div id="header"><div id="tabbar"></div></div>
        <div id="panes"><div id="paneA" class="pane"></div><div id="paneB" class="pane hidden"></div><div id="mdpreview" class="hidden"></div></div>
        <div id="diff" class="hidden"></div>
        <div id="change-bar" class="hidden"></div>
        <div id="statusbar"></div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
