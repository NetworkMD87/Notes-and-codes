<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" />
    <title>Notes & Codes</title>
    <style>
      html,body,#app{height:100%;margin:0;font-family:Segoe UI,system-ui,sans-serif}
      #app{display:flex;flex-direction:column;position:relative}
      #header{height:34px;display:flex;align-items:center;background:var(--bar)}
      #tabbar{flex:1;min-width:0;height:100%;display:flex;align-items:center;overflow-x:auto}
      #panes{flex:1;display:flex;min-height:0}
      .pane{flex:1;min-width:0;overflow:hidden}
      .pane.hidden{display:none}
      #statusbar{height:22px;background:#007acc;color:#fff;font-size:12px;display:flex;align-items:center;gap:12px;padding:0 8px}
      .tab{display:flex;align-items:center;gap:6px;padding:0 10px;height:100%;color:#ccc;border-right:1px solid #1e1e1e;cursor:pointer;white-space:nowrap}
      .tab.active{background:#1e1e1e;color:#fff}
      .tab-close{opacity:.6}.tab-close:hover{opacity:1}
      .tab-add{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0 10px}
      .gutter{background:#333;cursor:col-resize}
      .gutter.gutter-horizontal{width:6px}
      body[data-theme="light"]{--bar:#f3f3f3;--bartext:#333;--tabbg:#ececec;--editorbg:#fff}
      body[data-theme="dark"]{--bar:#252526;--bartext:#ccc;--tabbg:#2d2d2d;--editorbg:#1e1e1e}
      #theme-toggle{background:none;border:none;color:var(--bartext);cursor:pointer;font-size:14px;padding:0 10px}
      #toolbar{margin-left:auto;display:flex;align-items:center;gap:1px;padding:0 2px}
      .tb-btn{background:none;border:none;color:var(--bartext);cursor:pointer;padding:4px 6px;display:flex;align-items:center;border-radius:4px;line-height:0}
      .tb-btn:hover{background:rgba(127,127,127,.18)}
      .tb-btn.tb-active{background:#0a66c2;color:#fff}
      .tb-sep{width:1px;height:18px;background:rgba(127,127,127,.35);margin:0 4px}
      #palette{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;justify-content:center;align-items:flex-start;padding-top:80px;z-index:100}
      #palette.hidden{display:none}
      #palette input{width:520px;padding:8px;font-size:14px}
      .palette-list{width:520px;background:var(--bar);max-height:300px;overflow:auto}
      .palette-row{padding:6px 8px;color:var(--bartext);cursor:pointer;display:flex;justify-content:space-between;gap:16px}
      .palette-hint{opacity:.55;font-size:12px}
      .palette-row.active{background:#094771;color:#fff}
      #diff{position:absolute;inset:34px 0 22px 0;background:var(--editorbg);z-index:100}
      #diff.hidden{display:none}
      .diff-picker{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;justify-content:center;align-items:flex-start;padding-top:90px;z-index:100}
      .diff-picker.hidden{display:none}
      .diff-picker-box{display:grid;grid-template-columns:auto 1fr;gap:8px 10px;background:var(--bar);color:var(--bartext);padding:16px;border-radius:6px}
      .diff-picker-box button{grid-column:1 / -1}
      #toast-host{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:6px;z-index:200}
      .toast{background:#333;color:#fff;padding:8px 14px;border-radius:4px;font-size:13px;opacity:.95}
      .sb-click{cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px}
      .sb-click:hover{opacity:.8}
      #mdpreview{flex:1;min-width:0;overflow:auto;padding:0 16px;background:var(--editorbg);color:var(--bartext)}
      #mdpreview.hidden{display:none}
      #mdpreview pre{background:rgba(127,127,127,.15);padding:8px;border-radius:4px;overflow:auto}
      #mdpreview code{font-family:Consolas,monospace}
      .ph-picker{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;justify-content:center;align-items:flex-start;padding-top:80px;z-index:100}
      .ph-picker.hidden{display:none}
      .ph-list{width:560px;max-height:340px;overflow:auto;background:var(--bar);color:var(--bartext)}
      .ph-row{padding:6px 10px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid rgba(127,127,127,.15)}
      .ph-row:hover{background:#094771;color:#fff}
    </style>
  </head>
  <body>
    <div id="app">
      <div id="header"><div id="tabbar"></div></div>
      <div id="panes"><div id="paneA" class="pane"></div><div id="paneB" class="pane hidden"></div><div id="mdpreview" class="hidden"></div></div>
      <div id="diff" class="hidden"></div>
      <div id="statusbar"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
